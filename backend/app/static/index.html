<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Beat the Buffet — Sushi Counter</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      max-width: 760px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    h1 { margin-bottom: 0.25rem; }
    p.sub { color: #666; margin-top: 0; }
    .stage {
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 4/3;
    }
    video, canvas.preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    canvas.preview { display: none; }
    canvas#hidden { display: none; }
    .controls { display: flex; gap: 0.5rem; margin: 1rem 0; flex-wrap: wrap; }
    button {
      font-size: 1rem;
      padding: 0.65rem 1.2rem;
      border: 0;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
    button.secondary { background: #6b7280; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { color: #6b7280; min-height: 1.2rem; margin-bottom: 0.5rem; }
    #error { color: #ef4444; min-height: 1.2rem; font-size: 0.9rem; }
    .total {
      font-size: 1.4rem;
      font-weight: 700;
      margin: 1rem 0 0.5rem;
    }
    .count-row {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid #e5e7eb;
      font-size: 1.05rem;
    }
    .count-row .qty {
      font-weight: 700;
      color: #2563eb;
      font-variant-numeric: tabular-nums;
    }
    .price-section {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 2px solid #2563eb;
    }
    .price-total {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      color: #10b981;
    }
    .price-loc {
      font-size: 0.85rem;
      color: #6b7280;
      margin-bottom: 0.5rem;
    }
    .price-row {
      display: flex;
      justify-content: space-between;
      padding: 0.4rem 0;
      border-bottom: 1px solid #e5e7eb;
      font-size: 0.95rem;
    }
    .price-row .calc {
      color: #6b7280;
      font-variant-numeric: tabular-nums;
    }
    .price-row .sub {
      font-weight: 600;
      color: #10b981;
      font-variant-numeric: tabular-nums;
    }
    .price-unavail {
      color: #6b7280;
      font-style: italic;
      margin-top: 1rem;
    }
    .location-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin: 0.75rem 0 0.5rem;
      flex-wrap: wrap;
    }
    .location-bar label {
      font-size: 0.95rem;
      color: #6b7280;
    }
    select#location {
      font-size: 1rem;
      padding: 0.45rem 0.7rem;
      border: 1px solid #6b7280;
      border-radius: 6px;
      background: transparent;
      color: inherit;
      cursor: pointer;
    }
    .location-status {
      font-size: 0.85rem;
      color: #6b7280;
    }
    .location-status.ready { color: #10b981; }
    .location-status.loading { color: #f59e0b; }
  </style>
</head>
<body>
  <h1>Sushi Counter</h1>
  <p class="sub">Point your webcam at a plate of sushi, then capture.</p>

  <div class="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="preview" class="preview"></canvas>
  </div>
  <canvas id="hidden"></canvas>

  <div class="controls">
    <button id="capture">Capture & Count</button>
    <button id="retake" class="secondary" disabled>Retake</button>
  </div>

  <div class="location-bar">
    <label for="location">Pricing location:</label>
    <select id="location"></select>
    <span id="location-status" class="location-status"></span>
  </div>

  <div id="status"></div>
  <div id="error"></div>
  <div id="total" class="total"></div>
  <div id="counts"></div>
  <div id="pricing"></div>

  <script>
    const video = document.getElementById("video");
    const previewCanvas = document.getElementById("preview");
    const hiddenCanvas = document.getElementById("hidden");
    const captureBtn = document.getElementById("capture");
    const retakeBtn = document.getElementById("retake");
    const statusEl = document.getElementById("status");
    const errorEl = document.getElementById("error");
    const totalEl = document.getElementById("total");
    const countsEl = document.getElementById("counts");
    const pricingEl = document.getElementById("pricing");
    const locationSelect = document.getElementById("location");
    const locationStatusEl = document.getElementById("location-status");

    const BOX_COLOR = "#2563eb";
    const warmedLocations = new Set();

    async function initLocations() {
      try {
        const res = await fetch("/locations");
        const json = await res.json();
        locationSelect.innerHTML = json.locations
          .map((c) => `<option value="${c}"${c === json.default ? " selected" : ""}>${c}</option>`)
          .join("");
        // Default location is prefetched by the server at startup.
        warmedLocations.add(json.default);
        setLocationStatus("ready", "prices ready");
      } catch (err) {
        locationStatusEl.textContent = "Could not load locations: " + err.message;
      }
    }

    function setLocationStatus(state, text) {
      locationStatusEl.className = "location-status " + state;
      locationStatusEl.textContent = text;
    }

    async function prewarmLocation(loc) {
      if (warmedLocations.has(loc)) {
        setLocationStatus("ready", "prices ready");
        return;
      }
      setLocationStatus("loading", `Fetching ${loc} prices...`);
      try {
        const fd = new FormData();
        fd.append("location", loc);
        const res = await fetch("/prewarm", { method: "POST", body: fd });
        const json = await res.json();
        if (json.loaded) {
          warmedLocations.add(loc);
          setLocationStatus("ready", "prices ready");
        } else {
          setLocationStatus("", "prewarm skipped (no API key?)");
        }
      } catch (err) {
        setLocationStatus("", "Prewarm failed: " + err.message);
      }
    }

    locationSelect.addEventListener("change", () => prewarmLocation(locationSelect.value));

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" },
          audio: false,
        });
        video.srcObject = stream;
      } catch (err) {
        statusEl.textContent = "Webcam error: " + err.message;
      }
    }

    function showVideo() {
      video.style.display = "block";
      previewCanvas.style.display = "none";
      retakeBtn.disabled = true;
      captureBtn.disabled = false;
      totalEl.textContent = "";
      countsEl.innerHTML = "";
      pricingEl.innerHTML = "";
      statusEl.textContent = "";
      errorEl.textContent = "";
    }

    function renderPricing(pricing) {
      if (!pricing || !pricing.available) {
        pricingEl.innerHTML = `<div class="price-unavail">Pricing unavailable (set SERPER_API_KEY in .env)</div>`;
        return;
      }
      const rows = pricing.breakdown.map((b) => {
        if (b.subtotal == null) {
          return `
            <div class="price-row">
              <span>${b.display} × ${b.count}</span>
              <span class="calc">price unavailable</span>
            </div>`;
        }
        return `
          <div class="price-row">
            <span>${b.display}</span>
            <span class="calc">${b.count} × $${b.price_per_piece.toFixed(2)}</span>
            <span class="sub">$${b.subtotal.toFixed(2)}</span>
          </div>`;
      }).join("");
      pricingEl.innerHTML = `
        <div class="price-section">
          <div class="price-total">Plate value: $${pricing.total.toFixed(2)}</div>
          <div class="price-loc">Estimated from ${pricing.location}, NY ingredient prices</div>
          ${rows}
        </div>`;
    }

    function drawBoxes(imageBitmap, boxes) {
      previewCanvas.width = imageBitmap.width;
      previewCanvas.height = imageBitmap.height;
      const ctx = previewCanvas.getContext("2d");
      ctx.drawImage(imageBitmap, 0, 0);

      const lineWidth = Math.max(2, Math.round(imageBitmap.width / 250));
      const fontPx = Math.max(14, Math.round(imageBitmap.width / 40));
      ctx.lineWidth = lineWidth;
      ctx.font = `bold ${fontPx}px -apple-system, sans-serif`;
      ctx.textBaseline = "top";

      boxes.forEach((box, i) => {
        const [x1, y1, x2, y2] = box;
        ctx.strokeStyle = BOX_COLOR;
        ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);

        const num = String(i + 1);
        const w = ctx.measureText(num).width + 12;
        const h = fontPx + 8;
        ctx.fillStyle = BOX_COLOR;
        ctx.fillRect(x1, y1, w, h);
        ctx.fillStyle = "#fff";
        ctx.fillText(num, x1 + 6, y1 + 4);
      });

      video.style.display = "none";
      previewCanvas.style.display = "block";
    }

    captureBtn.addEventListener("click", async () => {
      if (!video.videoWidth) {
        statusEl.textContent = "Camera not ready yet — wait a moment.";
        return;
      }
      hiddenCanvas.width = video.videoWidth;
      hiddenCanvas.height = video.videoHeight;
      hiddenCanvas.getContext("2d").drawImage(video, 0, 0);
      const blob = await new Promise((r) => hiddenCanvas.toBlob(r, "image/jpeg", 0.9));

      captureBtn.disabled = true;
      retakeBtn.disabled = false;
      statusEl.textContent = "Analyzing image...";
      errorEl.textContent = "";
      totalEl.textContent = "";
      countsEl.innerHTML = "";
      pricingEl.innerHTML = "";

      try {
        const fd = new FormData();
        fd.append("file", blob, "frame.jpg");
        fd.append("location", locationSelect.value);
        const res = await fetch("/identify", { method: "POST", body: fd });
        if (!res.ok) throw new Error("server " + res.status);
        const json = await res.json();
        warmedLocations.add(locationSelect.value);

        const bitmap = await createImageBitmap(blob);
        drawBoxes(bitmap, json.boxes || []);

        if (json.error) {
          statusEl.textContent = "";
          errorEl.textContent = "LLM: " + json.error;
          return;
        }

        if (json.total === 0) {
          statusEl.textContent = "No sushi found.";
        } else {
          statusEl.textContent = "";
          totalEl.textContent = `Total: ${json.total} piece${json.total === 1 ? "" : "s"}`;
          countsEl.innerHTML = json.counts
            .map((c) => `
              <div class="count-row">
                <span>${c.display}</span>
                <span class="qty">${c.count}</span>
              </div>`)
            .join("");
          renderPricing(json.pricing);
        }
      } catch (err) {
        statusEl.textContent = "";
        errorEl.textContent = "Error: " + err.message;
      }
    });

    retakeBtn.addEventListener("click", showVideo);
    startCamera();
    initLocations();
  </script>
</body>
</html>
